<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Parallax Preview</title>
  <style>
    body {
      margin: 0;
      background: #0a0a0b;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      perspective: 1000px;
    }
    .img-container {
      width: 400px;
      height: 400px;
      border-radius: 50%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.1s ease-out;
      animation: float 6s ease-in-out infinite, spin 10s linear infinite;
    }
    .img-layer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: url('/concept.png') center/cover no-repeat;
      border-radius: 50%;
      /* create a soft mask so it blends well */
      -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
      mask-image: radial-gradient(circle, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
    }
    .glow-layer {
      position: absolute;
      top: -10%; left: -10%; width: 120%; height: 120%;
      background: radial-gradient(circle at 50% 50%, rgba(232,40,40,0.15) 0%, rgba(0,0,0,0) 70%);
      transform: translateZ(-20px);
      pointer-events: none;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotateY(0deg); }
      50% { transform: translateY(-15px) rotateY(180deg); }
    }
    @keyframes spin {
      from { transform: rotateY(0deg); }
      to { transform: rotateY(360deg); }
    }
  </style>
</head>
<body>

<div class="img-container" id="card">
  <div class="glow-layer"></div>
  <div class="img-layer"></div>
</div>

<script>
  // Mouse rotation removed for spinning
</script>

</body>
</html>
